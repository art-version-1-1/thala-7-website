<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Thala 7</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">

            <div class="logo">
                <span class="logo-color">THALA</span> <span class="logo-c2">7.</span>
            </div>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="#">About</a></li>
                <li class="dropdown">
                    <a href="#">Brands</a>
                    <ul class="dropdown-menu">
                        <li><a href="#">Nike</a></li>
                        <li><a href="#">Adidas</a></li>
                        <li><a href="#">Puma</a></li>
                        <li><a href="#">Reebok</a></li>
                    </ul>
                </li>
                <li class="dropdown">
                    <a href="#">More</a>
                    <ul class="dropdown-menu">
                        <li><a href="#">New Arrivals</a></li>
                        <li><a href="#">Sale</a></li>
                        <li><a href="#">Best Sellers</a></li>
                        <li><a href="#">FAQs</a></li>
                    </ul>
                </li>
                <li><a href="#">Contact</a></li>
            </ul>

            <div class="right-nav">
                <div class="search-box">
                    <input type="text" placeholder="Search...">
                </div>

                <div class="my-cart">
                    <a href="cart.html"><img src="images\10252891.png" alt="My Cart"></a>
                </div>

                <div class="login">
                    <a href="#">Login</a>
                </div>
            </div>
            </div>
        </nav>
    </header>


    <div class="checkout-head">
        <h4>
            Checkout
        </h4>
    </div>

    <main class="checkout-main">

        <section class="left-checkout">
            <h2>Contact </h2>
            <form class="checkout-form">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="micky mouse" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="bhot_mehnat_hai@example.com" required>
                </form>

            <h2>Payment</h2>
            
            <form class="checkout-form">
                <label for="card">Card Number</label>
                <input type="text" id="card" name="card" placeholder="1234 5678 9012 3456" required>

                <label for="expiry">Expiry Date</label>
                <input type="text" id="expiry" name="expiry" placeholder="MM/YY" required>

                <label for="cvv">CVV</label>
                <input type="text" id="cvv" name="cvv" placeholder="123" required>

        </section>

        <section class="right-checkout">
            <div class="sc-bill">
                <h4>Enter Coupon Code</h4>
                <div class="coupon">
                    <input class="c-code" type="text" placeholder="EEECC10-LKDJKL"> 
                    <button class="apply-btn">Apply Coupon</button>
                </div>
                <h2>Bill Summary</h2>
                <div class="checkout-bill">
                <p>Subtotal: <span class="r-bill">₹3,999.00</span></p>
                <p>Shipping: <span class="r-bill">₹0.00</span></p>
                <p>Total: <span class="r-bill">₹3,999.00</span></p>
                </div>
                <button class="checkout-btn"> Pay Now</button>
            </div>
        </section>
    </main>
</body>
</html>
